<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>こてまるサプリチェック</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fff7fb;
      --ink: #30242b;
      --muted: #756671;
      --line: #ead7e4;
      --pink: #ff77ad;
      --pink-dark: #dc3c82;
      --blue: #77b7ff;
      --mint: #67cbb1;
      --sun: #ffcb5c;
      --card: rgba(255, 255, 255, 0.82);
      --shadow: 0 18px 45px rgba(183, 89, 137, 0.18);
      font-family: ui-rounded, "Hiragino Maru Gothic ProN", "Hiragino Sans", system-ui, -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 12%, rgba(255, 203, 92, 0.26), transparent 30%),
        linear-gradient(145deg, #fff8fc 0%, #eef7ff 52%, #fff4df 100%);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 24px;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(320px, 410px) 1fr;
      min-height: calc(100vh - 48px);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.54);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .side {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 22px;
      min-width: 0;
      padding: 28px;
      background: linear-gradient(180deg, rgba(255, 244, 250, 0.96), rgba(239, 248, 255, 0.9));
      border-right: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand > div:last-child {
      min-width: 0;
    }

    .mascot {
      position: relative;
      width: 70px;
      height: 70px;
      flex: 0 0 auto;
      border-radius: 50% 50% 46% 46%;
      background: #fff;
      border: 2px solid #f4d6e6;
      box-shadow: inset 0 -8px 0 #f4ede9, 0 10px 20px rgba(220, 60, 130, 0.12);
    }

    .mascot::before,
    .mascot::after {
      content: "";
      position: absolute;
      top: 16px;
      width: 13px;
      height: 17px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 30%, #fff 0 16%, #4598ff 18% 56%, #114f9b 58%);
    }

    .mascot::before {
      left: 18px;
    }

    .mascot::after {
      right: 18px;
    }

    .ribbon {
      position: absolute;
      left: 50%;
      top: -7px;
      width: 42px;
      height: 22px;
      transform: translateX(-50%);
      border-radius: 8px;
      background: var(--pink);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 14px;
      box-shadow: 0 5px 0 rgba(220, 60, 130, 0.16);
    }

    .cheeks {
      position: absolute;
      left: 15px;
      right: 15px;
      bottom: 19px;
      height: 10px;
      background:
        radial-gradient(circle at left, #ffb4cc 0 5px, transparent 6px),
        radial-gradient(circle at right, #ffb4cc 0 5px, transparent 6px);
    }

    .mouth {
      position: absolute;
      left: 50%;
      bottom: 15px;
      width: 14px;
      height: 8px;
      transform: translateX(-50%);
      border-bottom: 2px solid #9f6a7c;
      border-radius: 0 0 18px 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 7px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .today-card {
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
    }

    .date-label {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .big-check {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 14px;
      align-items: center;
      width: 100%;
      min-width: 0;
      padding: 14px;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      text-align: left;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .big-check:hover {
      transform: translateY(-1px);
      border-color: #ffc1dc;
    }

    .check-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #f7f1f5;
      color: #aa91a0;
      font-size: 30px;
      font-weight: 900;
    }

    .big-check.done {
      background: linear-gradient(135deg, #fff, #fff0f7);
      border-color: #ffabd0;
    }

    .big-check.done .check-icon {
      color: #fff;
      background: linear-gradient(135deg, var(--pink), var(--pink-dark));
      box-shadow: 0 8px 18px rgba(220, 60, 130, 0.24);
    }

    .check-title {
      display: block;
      font-weight: 900;
      font-size: 18px;
    }

    .check-sub {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 13px;
    }

    .comment {
      min-height: 94px;
      margin-top: 16px;
      padding: 16px;
      border-radius: 8px;
      background: #fff;
      border: 1px dashed #ffc1dc;
      line-height: 1.7;
      color: #5a3d4d;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      min-width: 0;
    }

    .stat {
      padding: 14px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid var(--line);
    }

    .stat strong {
      display: block;
      font-size: 26px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .settings {
      margin-top: auto;
      padding-top: 6px;
    }

    .field {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    .field input {
      width: 100%;
      padding: 12px 13px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    .field input:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 4px rgba(255, 119, 173, 0.15);
    }

    .main {
      min-width: 0;
      padding: 28px;
      background: rgba(255, 255, 255, 0.38);
    }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .month-title {
      margin: 0;
      font-size: clamp(23px, 3vw, 36px);
      letter-spacing: 0;
    }

    .nav {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .icon-btn,
    .today-btn {
      height: 40px;
      min-width: 40px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font-weight: 900;
    }

    .today-btn {
      padding: 0 14px;
      color: var(--pink-dark);
    }

    .weekdays,
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .weekdays {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }

    .day {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      aspect-ratio: 1 / 0.82;
      min-height: 76px;
      min-width: 0;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.76);
      color: var(--ink);
      text-align: left;
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
    }

    .day:hover {
      transform: translateY(-1px);
      border-color: #ffc1dc;
    }

    .day.outside {
      opacity: 0.38;
    }

    .day.today {
      border-color: var(--blue);
      box-shadow: inset 0 0 0 2px rgba(119, 183, 255, 0.22);
    }

    .day.done {
      background: linear-gradient(145deg, #fff, #fff0f7);
      border-color: #ff9ac5;
    }

    .day-num {
      font-weight: 900;
      font-size: 16px;
    }

    .pill {
      align-self: flex-end;
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #f0e8ee;
      color: #b49bab;
      font-weight: 900;
    }

    .day.done .pill {
      background: var(--pink);
      color: #fff;
    }

    .day-note {
      width: 100%;
      min-height: 18px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bottom {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 12px;
      margin-top: 18px;
    }

    .memo,
    .history {
      padding: 16px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
    }

    .memo label,
    .history h2 {
      display: block;
      margin: 0 0 9px;
      font-size: 14px;
      color: var(--muted);
      font-weight: 800;
    }

    .memo input {
      width: 100%;
      padding: 12px 13px;
      border-radius: 8px;
      border: 1px solid var(--line);
      outline: none;
    }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 42px;
    }

    .history-chip {
      padding: 7px 9px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 820px) {
      .app {
        padding: 12px;
      }

      .shell {
        grid-template-columns: 1fr;
      }

      .side {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .calendar-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .day {
        min-height: 58px;
        padding: 7px;
      }

      .day-note {
        display: none;
      }

      .bottom {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 500px) {
      .app {
        padding: 12px;
      }

      .shell {
        width: calc(100vw - 24px);
        max-width: calc(100vw - 24px);
      }

      .side,
      .main {
        width: 100%;
        max-width: 100%;
        overflow: hidden;
        padding: 18px;
      }

      .brand {
        display: grid;
        grid-template-columns: 58px minmax(0, 1fr);
        align-items: flex-start;
      }

      .mascot {
        width: 58px;
        height: 58px;
      }

      .ribbon {
        width: 36px;
        height: 20px;
        font-size: 13px;
      }

      .mascot::before,
      .mascot::after {
        top: 14px;
        width: 11px;
        height: 15px;
      }

      .mascot::before {
        left: 15px;
      }

      .mascot::after {
        right: 15px;
      }

      .cheeks {
        left: 12px;
        right: 12px;
        bottom: 16px;
      }

      .mouth {
        bottom: 12px;
      }

      h1 {
        font-size: 26px;
      }

      .subtitle {
        font-size: 13px;
        line-height: 1.55;
      }

      .today-card {
        padding: 16px;
      }

      .big-check {
        grid-template-columns: 46px minmax(0, 1fr);
        padding: 12px;
      }

      .check-icon {
        width: 46px;
        height: 46px;
        font-size: 26px;
      }

      .comment {
        padding: 14px;
        font-size: 14px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .weekdays,
      .calendar {
        gap: 5px;
      }

      .day {
        aspect-ratio: 1;
        min-height: 36px;
        align-items: center;
        padding: 5px;
      }

      .pill {
        width: 20px;
        height: 20px;
        align-self: center;
        font-size: 12px;
      }

      .day-num {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell" aria-label="サプリチェックアプリ">
      <aside class="side">
        <div class="brand">
          <div class="mascot" aria-hidden="true">
            <div class="ribbon">✓</div>
            <div class="cheeks"></div>
            <div class="mouth"></div>
          </div>
          <div>
            <h1>こてまる<br>サプリチェック</h1>
            <p class="subtitle">飲んだ日をぽんっと残して、こてまるが小さくほめるよ。</p>
          </div>
        </div>

        <section class="today-card" aria-label="今日のチェック">
          <p class="date-label" id="todayLabel"></p>
          <button class="big-check" id="todayCheck" type="button">
            <span class="check-icon" aria-hidden="true">✓</span>
            <span>
              <span class="check-title" id="todayTitle">今日のチェック</span>
              <span class="check-sub" id="todaySub">飲んだらここを押すだけ</span>
            </span>
          </button>
          <div class="comment" id="comment" aria-live="polite"></div>
        </section>

        <div class="stats" aria-label="記録">
          <div class="stat">
            <strong id="monthCount">0</strong>
            <span>今月のチェック</span>
          </div>
          <div class="stat">
            <strong id="streakCount">0</strong>
            <span>連続日数</span>
          </div>
        </div>

        <div class="settings">
          <label class="field">
            サプリ名
            <input id="supplementName" autocomplete="off" maxlength="24" placeholder="例：ビタミン、鉄分、亜鉛">
          </label>
        </div>
      </aside>

      <section class="main">
        <div class="calendar-head">
          <h2 class="month-title" id="monthTitle"></h2>
          <div class="nav" aria-label="月の移動">
            <button class="icon-btn" id="prevMonth" type="button" aria-label="前の月">‹</button>
            <button class="today-btn" id="jumpToday" type="button">今日</button>
            <button class="icon-btn" id="nextMonth" type="button" aria-label="次の月">›</button>
          </div>
        </div>

        <div class="weekdays" aria-hidden="true">
          <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
        </div>
        <div class="calendar" id="calendar"></div>

        <div class="bottom">
          <div class="memo">
            <label for="memoInput" id="memoLabel">選んだ日のメモ</label>
            <input id="memoInput" maxlength="30" placeholder="体調、飲んだ時間、ひとこと">
          </div>
          <div class="history">
            <h2>最近チェックした日</h2>
            <div class="history-list" id="historyList"></div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "kotemaruSupplementChecks";
    const NAME_KEY = "kotemaruSupplementName";
    const state = {
      visible: startOfMonth(new Date()),
      selected: toKey(new Date()),
      records: loadRecords(),
      supplementName: localStorage.getItem(NAME_KEY) || ""
    };

    const comments = {
      done: [
        "飲めたね。えらい。こういう小さい積み重ね、こてまる大好きだよ💖",
        "ぽんってチェックできたね。今日の自分のこと、ちゃんと守れてるよ。",
        "きゃあぁぁぁ〜💖 サプリ完了だね。忘れないで押せたの、ほんとにえらいっ。",
        "よしよし、今日の分おしまい。こてまるがカレンダーに花丸つけとくね。"
      ],
      undone: [
        "チェック外したよ。飲む前に押しちゃった時も大丈夫。何も悪くないからね。",
        "いったん未チェックに戻したよ。あとで飲んだらまたぽんって押そ。",
        "間違えても全然いいよ。こてまる、ちゃんと一緒に見てるからね💖"
      ],
      selectDone: [
        "この日は飲めてるよ。過去の自分、ちゃんとがんばってる。",
        "ここ、チェック済み。カレンダーに残ってるのかわいいね。",
        "この日もえらかった日だよ。こてまる覚えてる感じする。"
      ],
      selectEmpty: [
        "この日はまだ空っぽだよ。必要ならぽんって押して残せるよ。",
        "空いてる日だね。忘れちゃう日があっても、また今日からで大丈夫。",
        "ここは未チェック。カレンダーって責めるものじゃなくて、思い出すためのものだよ。"
      ]
    };

    const els = {
      todayLabel: document.querySelector("#todayLabel"),
      todayCheck: document.querySelector("#todayCheck"),
      todayTitle: document.querySelector("#todayTitle"),
      todaySub: document.querySelector("#todaySub"),
      comment: document.querySelector("#comment"),
      monthCount: document.querySelector("#monthCount"),
      streakCount: document.querySelector("#streakCount"),
      supplementName: document.querySelector("#supplementName"),
      monthTitle: document.querySelector("#monthTitle"),
      prevMonth: document.querySelector("#prevMonth"),
      nextMonth: document.querySelector("#nextMonth"),
      jumpToday: document.querySelector("#jumpToday"),
      calendar: document.querySelector("#calendar"),
      memoInput: document.querySelector("#memoInput"),
      memoLabel: document.querySelector("#memoLabel"),
      historyList: document.querySelector("#historyList")
    };

    els.supplementName.value = state.supplementName;
    els.comment.textContent = "サプリ忘れちゃうの、あるあるすぎるよね。ここは責める場所じゃなくて、思い出せた日にこてまるがほめる場所だよ💖";

    els.todayCheck.addEventListener("click", () => {
      toggleDate(toKey(new Date()), true);
    });

    els.prevMonth.addEventListener("click", () => {
      state.visible = new Date(state.visible.getFullYear(), state.visible.getMonth() - 1, 1);
      render();
    });

    els.nextMonth.addEventListener("click", () => {
      state.visible = new Date(state.visible.getFullYear(), state.visible.getMonth() + 1, 1);
      render();
    });

    els.jumpToday.addEventListener("click", () => {
      const today = new Date();
      state.visible = startOfMonth(today);
      state.selected = toKey(today);
      render();
      say(isDone(state.selected) ? pick(comments.selectDone) : "今日に戻ったよ。飲んだら大きいチェックをぽん、で大丈夫。");
    });

    els.supplementName.addEventListener("input", () => {
      state.supplementName = els.supplementName.value.trim();
      localStorage.setItem(NAME_KEY, state.supplementName);
      renderToday();
    });

    els.memoInput.addEventListener("input", () => {
      const record = ensureRecord(state.selected);
      record.note = els.memoInput.value.trim();
      if (!record.done && !record.note) {
        delete state.records[state.selected];
      }
      saveRecords();
      renderCalendar();
      renderHistory();
    });

    function toggleDate(key, fromTodayButton = false) {
      const record = ensureRecord(key);
      record.done = !record.done;
      if (!record.done && !record.note) {
        delete state.records[key];
      }
      state.selected = key;
      state.visible = startOfMonth(fromKey(key));
      saveRecords();
      render();
      say(record.done ? pick(comments.done) : pick(comments.undone));
      if (fromTodayButton) {
        els.todayCheck.focus();
      }
    }

    function selectDate(key) {
      state.selected = key;
      render();
      say(isDone(key) ? pick(comments.selectDone) : pick(comments.selectEmpty));
    }

    function render() {
      renderToday();
      renderStats();
      renderCalendar();
      renderMemo();
      renderHistory();
    }

    function renderToday() {
      const today = new Date();
      const todayKey = toKey(today);
      const done = isDone(todayKey);
      const name = state.supplementName || "サプリ";
      els.todayLabel.textContent = formatLong(today);
      els.todayCheck.classList.toggle("done", done);
      els.todayCheck.setAttribute("aria-pressed", String(done));
      els.todayTitle.textContent = done ? `${name}、飲んだよ` : `${name}を飲んだ？`;
      els.todaySub.textContent = done ? "今日のチェック済み" : "飲んだらここを押すだけ";
    }

    function renderStats() {
      const year = state.visible.getFullYear();
      const month = state.visible.getMonth();
      const monthDone = Object.entries(state.records).filter(([key, record]) => {
        const date = fromKey(key);
        return record.done && date.getFullYear() === year && date.getMonth() === month;
      }).length;
      els.monthCount.textContent = monthDone;
      els.streakCount.textContent = getStreak();
    }

    function renderCalendar() {
      els.calendar.innerHTML = "";
      els.monthTitle.textContent = `${state.visible.getFullYear()}年 ${state.visible.getMonth() + 1}月`;
      const first = startOfMonth(state.visible);
      const start = new Date(first);
      start.setDate(first.getDate() - first.getDay());
      const todayKey = toKey(new Date());

      for (let i = 0; i < 42; i += 1) {
        const date = new Date(start);
        date.setDate(start.getDate() + i);
        const key = toKey(date);
        const record = state.records[key] || {};
        const button = document.createElement("button");
        button.type = "button";
        button.className = "day";
        button.classList.toggle("outside", date.getMonth() !== state.visible.getMonth());
        button.classList.toggle("today", key === todayKey);
        button.classList.toggle("done", Boolean(record.done));
        button.setAttribute("aria-pressed", String(Boolean(record.done)));
        button.setAttribute("aria-label", `${formatShort(date)} ${record.done ? "チェック済み" : "未チェック"}`);
        button.innerHTML = `
          <span class="day-num">${date.getDate()}</span>
          <span class="pill" aria-hidden="true">${record.done ? "✓" : ""}</span>
          <span class="day-note">${escapeHtml(record.note || "")}</span>
        `;
        button.addEventListener("click", (event) => {
          if (event.altKey || event.metaKey || event.shiftKey) {
            toggleDate(key);
          } else if (state.selected === key) {
            toggleDate(key);
          } else {
            selectDate(key);
          }
        });
        els.calendar.append(button);
      }
    }

    function renderMemo() {
      const selectedDate = fromKey(state.selected);
      const record = state.records[state.selected] || {};
      els.memoLabel.textContent = `${formatShort(selectedDate)} のメモ`;
      els.memoInput.value = record.note || "";
    }

    function renderHistory() {
      const recent = Object.entries(state.records)
        .filter(([, record]) => record.done)
        .sort(([a], [b]) => b.localeCompare(a))
        .slice(0, 8);
      els.historyList.innerHTML = "";
      if (!recent.length) {
        const empty = document.createElement("span");
        empty.className = "history-chip";
        empty.textContent = "まだこれから";
        els.historyList.append(empty);
        return;
      }
      for (const [key] of recent) {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "history-chip";
        chip.textContent = formatShort(fromKey(key));
        chip.addEventListener("click", () => selectDate(key));
        els.historyList.append(chip);
      }
    }

    function say(message) {
      els.comment.textContent = message;
    }

    function ensureRecord(key) {
      if (!state.records[key]) {
        state.records[key] = { done: false, note: "" };
      }
      return state.records[key];
    }

    function isDone(key) {
      return Boolean(state.records[key]?.done);
    }

    function getStreak() {
      let streak = 0;
      const cursor = new Date();
      while (isDone(toKey(cursor))) {
        streak += 1;
        cursor.setDate(cursor.getDate() - 1);
      }
      return streak;
    }

    function loadRecords() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.records));
    }

    function startOfMonth(date) {
      return new Date(date.getFullYear(), date.getMonth(), 1);
    }

    function toKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function fromKey(key) {
      const [year, month, day] = key.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function formatLong(date) {
      return new Intl.DateTimeFormat("ja-JP", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long"
      }).format(date);
    }

    function formatShort(date) {
      return new Intl.DateTimeFormat("ja-JP", {
        month: "numeric",
        day: "numeric",
        weekday: "short"
      }).format(date);
    }

    function pick(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    render();
  </script>
</body>
</html>
