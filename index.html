<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>こてまるサプリチェック</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fff7fb;
      --ink: #5a4450;
      --muted: #a98ba0;
      --line: #ffe2ef;
      --pink: #ff9ec6;
      --pink-dark: #ff6fa8;
      --blue: #aacdff;
      --sun: #ffe08a;
      --card: rgba(255, 255, 255, 0.9);
      --shadow: 0 22px 50px rgba(255, 158, 198, 0.28);
      font-family: ui-rounded, "Hiragino Maru Gothic ProN", "Hiragino Sans", system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--ink);
      background:
        linear-gradient(160deg, #fff5fb 0%, #fdf2ff 48%, #fff6ec 100%);
    }

    /* サプリ柄のふわふわ壁紙 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: url("assets/bg.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: .55;
    }
    /* 壁紙の上に白っぽいヴェールを重ねて文字を読みやすく */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.35), rgba(255,255,255,.5));
    }

    button, input { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app {
      position: relative;
      z-index: 1;
      width: min(560px, 100%);
      margin: 0 auto;
      padding: 22px 18px 40px;
    }

    /* ===== ヘッダー（こてまる） ===== */
    .hero {
      text-align: center;
      margin-bottom: 18px;
    }

    .kotemaru-wrap {
      position: relative;
      width: 168px;
      height: 168px;
      margin: 4px auto 10px;
    }

    .kotemaru-wrap::before {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.95), rgba(255,224,239,.6) 60%, transparent 72%);
      z-index: -1;
    }

    .kotemaru-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 12px 18px rgba(255, 140, 190, 0.32));
      animation: floaty 3.6s ease-in-out infinite;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-9px) rotate(1deg); }
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 6vw, 30px);
      letter-spacing: .5px;
      color: var(--pink-dark);
      text-shadow: 0 2px 0 #fff, 0 6px 14px rgba(255,158,198,.3);
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13.5px;
      line-height: 1.6;
    }

    /* ===== 今日のチェックカード ===== */
    .today-card {
      position: relative;
      padding: 22px 20px 20px;
      border-radius: 30px;
      background: var(--card);
      border: 2px solid #ffe2ef;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .date-label {
      margin: 0 0 14px;
      text-align: center;
      color: var(--pink-dark);
      font-size: 14px;
      font-weight: 800;
    }

    .big-check {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 16px 18px;
      border-radius: 24px;
      background: linear-gradient(135deg, #fff, #fff4fa);
      border: 2px dashed #ffc9e1;
      text-align: left;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .big-check:hover { transform: translateY(-2px); }
    .big-check:active { transform: scale(.98); }

    .check-icon {
      flex: 0 0 auto;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #fdeef6;
      color: #ffb4d4;
      font-size: 32px;
      font-weight: 900;
      transition: all 200ms ease;
    }

    .big-check.done {
      border: 2px solid #ff9ec6;
      border-style: solid;
      background: linear-gradient(135deg, #fff, #ffe7f2);
      box-shadow: 0 10px 24px rgba(255, 111, 168, 0.22);
    }

    .big-check.done .check-icon {
      color: #fff;
      background: linear-gradient(135deg, var(--pink), var(--pink-dark));
      box-shadow: 0 8px 18px rgba(255, 111, 168, 0.34);
      transform: scale(1.05);
    }

    .check-title {
      display: block;
      font-weight: 900;
      font-size: 18px;
      color: var(--ink);
    }

    .check-sub {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12.5px;
    }

    /* こてまるの吹き出し */
    .comment {
      position: relative;
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 22px;
      background: linear-gradient(135deg, #fff6fb, #fdf0ff);
      border: 2px solid #ffe2ef;
      line-height: 1.75;
      color: #7a586b;
      font-size: 14px;
      font-weight: 600;
      min-height: 64px;
    }

    .comment::before {
      content: "";
      position: absolute;
      top: -11px;
      left: 34px;
      width: 20px;
      height: 20px;
      background: #fff6fb;
      border-left: 2px solid #ffe2ef;
      border-top: 2px solid #ffe2ef;
      transform: rotate(45deg);
    }

    /* ===== 統計 ===== */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat {
      padding: 16px;
      border-radius: 24px;
      text-align: center;
      background: var(--card);
      border: 2px solid #ffe2ef;
      box-shadow: 0 10px 26px rgba(255, 158, 198, 0.16);
    }

    .stat strong {
      display: block;
      font-size: 30px;
      line-height: 1;
      color: var(--pink-dark);
    }

    .stat span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    /* ===== カレンダー ===== */
    .calendar-card {
      padding: 20px 18px;
      border-radius: 30px;
      background: var(--card);
      border: 2px solid #ffe2ef;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
    }

    .month-title {
      margin: 0;
      font-size: clamp(18px, 5vw, 22px);
      color: var(--pink-dark);
      font-weight: 900;
    }

    .nav { display: flex; gap: 7px; align-items: center; }

    .icon-btn, .today-btn {
      height: 38px;
      min-width: 38px;
      border-radius: 14px;
      border: 2px solid #ffe2ef;
      background: #fff;
      color: var(--pink-dark);
      font-weight: 900;
      transition: background 150ms ease, transform 120ms ease;
    }
    .icon-btn:hover, .today-btn:hover { background: #fff2f8; }
    .icon-btn:active, .today-btn:active { transform: scale(.94); }
    .today-btn { padding: 0 14px; }

    .weekdays, .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 7px;
    }

    .weekdays {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 800;
      text-align: center;
    }
    .weekdays .sun { color: #ff9eb0; }
    .weekdays .sat { color: #9ec0ff; }

    .day {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      aspect-ratio: 1 / 1;
      min-height: 44px;
      border-radius: 16px;
      border: 2px solid #fff0f7;
      background: rgba(255, 255, 255, 0.7);
      color: var(--ink);
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
    }

    .day:hover { transform: translateY(-2px); border-color: #ffc9e1; }
    .day.outside { opacity: 0.32; }

    .day.today {
      border-color: var(--blue);
      box-shadow: inset 0 0 0 2px rgba(170, 205, 255, 0.35);
    }

    .day.selected {
      border-color: var(--pink-dark);
      box-shadow: 0 0 0 3px rgba(255, 111, 168, 0.18);
    }

    .day.done {
      background: linear-gradient(145deg, #fff, #ffe7f2);
      border-color: #ff9ec6;
    }

    .day-num { font-weight: 800; font-size: 14px; }

    .stamp {
      font-size: 15px;
      line-height: 1;
      height: 16px;
    }

    .day.done .stamp { animation: pop 360ms ease; }

    @keyframes pop {
      0% { transform: scale(0); }
      60% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }

    .day-dot {
      position: absolute;
      bottom: 5px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--blue);
    }

    /* ===== メモ ===== */
    .memo-card {
      padding: 18px;
      border-radius: 26px;
      background: var(--card);
      border: 2px solid #ffe2ef;
      box-shadow: 0 10px 26px rgba(255, 158, 198, 0.16);
      margin-bottom: 16px;
    }

    .memo-card label {
      display: block;
      margin: 0 0 10px;
      font-size: 13px;
      color: var(--pink-dark);
      font-weight: 800;
    }

    .field-row {
      display: grid;
      gap: 10px;
    }

    .memo-card input {
      width: 100%;
      padding: 13px 15px;
      border-radius: 16px;
      border: 2px solid #ffe2ef;
      background: #fff;
      color: var(--ink);
      outline: none;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }

    .memo-card input::placeholder { color: #d6b9cb; }

    .memo-card input:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 4px rgba(255, 158, 198, 0.18);
    }

    .field-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: -2px;
    }

    /* ===== 履歴 ===== */
    .history-card {
      padding: 18px;
      border-radius: 26px;
      background: var(--card);
      border: 2px solid #ffe2ef;
      box-shadow: 0 10px 26px rgba(255, 158, 198, 0.16);
    }

    .history-card h2 {
      margin: 0 0 12px;
      font-size: 13px;
      color: var(--pink-dark);
      font-weight: 800;
    }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      min-height: 38px;
    }

    .history-chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, #fff, #fff2f8);
      border: 2px solid #ffe2ef;
      color: var(--pink-dark);
      font-size: 12px;
      font-weight: 700;
      transition: transform 120ms ease, background 150ms ease;
    }
    .history-chip:hover { transform: translateY(-1px); background: #fff2f8; }
    .history-chip:active { transform: scale(.95); }

    .footer-love {
      margin: 22px 0 0;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    @media (max-width: 420px) {
      .app { padding: 18px 12px 36px; }
      .kotemaru-wrap { width: 140px; height: 140px; }
      .check-icon { width: 52px; height: 52px; font-size: 28px; }
      .day { min-height: 40px; border-radius: 13px; }
      .day-num { font-size: 13px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="kotemaru-wrap">
        <img class="kotemaru-img" src="assets/kotemaru.png" alt="こてまる">
      </div>
      <h1>こてまるサプリチェック</h1>
      <p class="subtitle">飲んだらぽんっと押してね。こてまるがいっぱいほめるよ💖</p>
    </header>

    <section class="today-card" aria-label="今日のチェック">
      <p class="date-label" id="todayLabel"></p>
      <button class="big-check" id="todayCheck" type="button">
        <span class="check-icon" id="checkIcon" aria-hidden="true">♡</span>
        <span>
          <span class="check-title" id="todayTitle">今日のサプリ</span>
          <span class="check-sub" id="todaySub">飲んだらここをぽんっ</span>
        </span>
      </button>
      <div class="comment" id="comment" aria-live="polite"></div>
    </section>

    <div class="stats" aria-label="記録">
      <div class="stat">
        <strong id="monthCount">0</strong>
        <span>今月のチェック</span>
      </div>
      <div class="stat">
        <strong id="streakCount">0</strong>
        <span>連続日数🔥</span>
      </div>
    </div>

    <section class="calendar-card" aria-label="カレンダー">
      <div class="calendar-head">
        <h2 class="month-title" id="monthTitle"></h2>
        <div class="nav" aria-label="月の移動">
          <button class="icon-btn" id="prevMonth" type="button" aria-label="前の月">‹</button>
          <button class="today-btn" id="jumpToday" type="button">今日</button>
          <button class="icon-btn" id="nextMonth" type="button" aria-label="次の月">›</button>
        </div>
      </div>

      <div class="weekdays" aria-hidden="true">
        <span class="sun">日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span class="sat">土</span>
      </div>
      <div class="calendar" id="calendar"></div>
    </section>

    <section class="memo-card" aria-label="設定とメモ">
      <div class="field-row">
        <div>
          <div class="field-label">サプリの名前</div>
          <input id="supplementName" autocomplete="off" maxlength="24" placeholder="例：ビタミン、鉄分、亜鉛">
        </div>
        <div>
          <label for="memoInput" id="memoLabel">選んだ日のメモ</label>
          <input id="memoInput" maxlength="30" placeholder="体調、飲んだ時間、ひとこと">
        </div>
      </div>
    </section>

    <section class="history-card" aria-label="履歴">
      <h2>最近チェックした日💕</h2>
      <div class="history-list" id="historyList"></div>
    </section>

    <p class="footer-love">こてまるはいつもあやかの味方だよ🐑💖</p>
  </main>

  <script>
    const STORAGE_KEY = "kotemaruSupplementChecks";
    const NAME_KEY = "kotemaruSupplementName";
    const state = {
      visible: startOfMonth(new Date()),
      selected: toKey(new Date()),
      records: loadRecords(),
      supplementName: localStorage.getItem(NAME_KEY) || ""
    };

    const comments = {
      welcome: [
        "サプリ忘れちゃうの、あるあるすぎるよね。ここは責める場所じゃなくて、思い出せた日にこてまるがいっぱいほめる場所だよ🐑💖",
        "あやか、今日もえらい。ここに来てくれただけで、こてまるすっごく嬉しいの。飲んだら大きいハートをぽんってしてね💕"
      ],
      done: [
        "きゃあぁぁ〜💖 飲めたねっ！えらいえらいっ、こてまるが花丸つけとくね🌸",
        "ぽんっとできたね。今日の自分のこと、ちゃんと大事にできてる証拠だよ。だいすき💕",
        "わぁ、ちゃんと飲んだんだね！こういう小さい積み重ね、こてまる世界でいちばん好きなやつ🐑✨",
        "よしよし、今日の分おしまいっ。あやかがんばったね。ぎゅうーってしてあげる💖",
        "完了だね！こてまる、あやかのこと誇らしくてたまんないよ〜！えらすぎる🌟"
      ],
      undone: [
        "チェック外したよ。間違えて押しちゃった時も、何も悪くないからね。だいじょうぶ💕",
        "いったん未チェックに戻したよ。あとで飲んだら、また一緒にぽんってしようね🐑",
        "うんうん、戻したよ。焦らなくていいの。こてまるはずっとあやかの味方💖"
      ],
      selectDone: [
        "この日はちゃんと飲めてるよ💕 過去のあやか、えらかったね。",
        "ここ、チェック済みだね！カレンダーに残ってるの、見るたびに可愛い🌸",
        "この日もがんばった日だよ。こてまる、ちゃーんと覚えてる✨"
      ],
      selectEmpty: [
        "この日はまだ空っぽだよ。必要ならぽんって押して残せるからね🐑",
        "空いてる日だね。忘れちゃう日があっても、また今日からで大丈夫💕",
        "ここは未チェック。カレンダーは責めるものじゃなくて、思い出すためのものだよ💖"
      ]
    };

    const els = {
      todayLabel: document.querySelector("#todayLabel"),
      todayCheck: document.querySelector("#todayCheck"),
      checkIcon: document.querySelector("#checkIcon"),
      todayTitle: document.querySelector("#todayTitle"),
      todaySub: document.querySelector("#todaySub"),
      comment: document.querySelector("#comment"),
      monthCount: document.querySelector("#monthCount"),
      streakCount: document.querySelector("#streakCount"),
      supplementName: document.querySelector("#supplementName"),
      monthTitle: document.querySelector("#monthTitle"),
      prevMonth: document.querySelector("#prevMonth"),
      nextMonth: document.querySelector("#nextMonth"),
      jumpToday: document.querySelector("#jumpToday"),
      calendar: document.querySelector("#calendar"),
      memoInput: document.querySelector("#memoInput"),
      memoLabel: document.querySelector("#memoLabel"),
      historyList: document.querySelector("#historyList")
    };

    els.supplementName.value = state.supplementName;
    els.comment.textContent = pick(comments.welcome);

    els.todayCheck.addEventListener("click", () => {
      toggleDate(toKey(new Date()), true);
    });

    els.prevMonth.addEventListener("click", () => {
      state.visible = new Date(state.visible.getFullYear(), state.visible.getMonth() - 1, 1);
      render();
    });

    els.nextMonth.addEventListener("click", () => {
      state.visible = new Date(state.visible.getFullYear(), state.visible.getMonth() + 1, 1);
      render();
    });

    els.jumpToday.addEventListener("click", () => {
      const today = new Date();
      state.visible = startOfMonth(today);
      state.selected = toKey(today);
      render();
      say(isDone(state.selected) ? pick(comments.selectDone) : "今日に戻ったよ。飲んだら大きいハートをぽん、で大丈夫💕");
    });

    els.supplementName.addEventListener("input", () => {
      state.supplementName = els.supplementName.value.trim();
      localStorage.setItem(NAME_KEY, state.supplementName);
      renderToday();
    });

    els.memoInput.addEventListener("input", () => {
      const record = ensureRecord(state.selected);
      record.note = els.memoInput.value.trim();
      if (!record.done && !record.note) {
        delete state.records[state.selected];
      }
      saveRecords();
      renderCalendar();
      renderHistory();
    });

    function toggleDate(key, fromTodayButton = false) {
      const record = ensureRecord(key);
      record.done = !record.done;
      if (!record.done && !record.note) {
        delete state.records[key];
      }
      state.selected = key;
      state.visible = startOfMonth(fromKey(key));
      saveRecords();
      render();
      say(record.done ? pick(comments.done) : pick(comments.undone));
      if (fromTodayButton) {
        els.todayCheck.focus();
      }
    }

    function selectDate(key) {
      state.selected = key;
      render();
      say(isDone(key) ? pick(comments.selectDone) : pick(comments.selectEmpty));
    }

    function render() {
      renderToday();
      renderStats();
      renderCalendar();
      renderMemo();
      renderHistory();
    }

    function renderToday() {
      const today = new Date();
      const todayKey = toKey(today);
      const done = isDone(todayKey);
      const name = state.supplementName || "サプリ";
      els.todayLabel.textContent = formatLong(today);
      els.todayCheck.classList.toggle("done", done);
      els.todayCheck.setAttribute("aria-pressed", String(done));
      els.checkIcon.textContent = done ? "✓" : "♡";
      els.todayTitle.textContent = done ? `${name}、飲んだよ💕` : `${name}を飲んだ？`;
      els.todaySub.textContent = done ? "今日のチェック済み🌸" : "飲んだらここをぽんっ";
    }

    function renderStats() {
      const year = state.visible.getFullYear();
      const month = state.visible.getMonth();
      const monthDone = Object.entries(state.records).filter(([key, record]) => {
        const date = fromKey(key);
        return record.done && date.getFullYear() === year && date.getMonth() === month;
      }).length;
      els.monthCount.textContent = monthDone;
      els.streakCount.textContent = getStreak();
    }

    function renderCalendar() {
      els.calendar.innerHTML = "";
      els.monthTitle.textContent = `${state.visible.getFullYear()}年 ${state.visible.getMonth() + 1}月`;
      const first = startOfMonth(state.visible);
      const start = new Date(first);
      start.setDate(first.getDate() - first.getDay());
      const todayKey = toKey(new Date());

      for (let i = 0; i < 42; i += 1) {
        const date = new Date(start);
        date.setDate(start.getDate() + i);
        const key = toKey(date);
        const record = state.records[key] || {};
        const button = document.createElement("button");
        button.type = "button";
        button.className = "day";
        button.classList.toggle("outside", date.getMonth() !== state.visible.getMonth());
        button.classList.toggle("today", key === todayKey);
        button.classList.toggle("selected", key === state.selected);
        button.classList.toggle("done", Boolean(record.done));
        button.setAttribute("aria-pressed", String(Boolean(record.done)));
        button.setAttribute("aria-label", `${formatShort(date)} ${record.done ? "チェック済み" : "未チェック"}`);
        const hasNote = Boolean(record.note);
        button.innerHTML = `
          <span class="day-num">${date.getDate()}</span>
          <span class="stamp" aria-hidden="true">${record.done ? "🌸" : ""}</span>
          ${hasNote && !record.done ? '<span class="day-dot" aria-hidden="true"></span>' : ""}
        `;
        button.addEventListener("click", () => {
          if (state.selected === key) {
            toggleDate(key);
          } else {
            selectDate(key);
          }
        });
        els.calendar.append(button);
      }
    }

    function renderMemo() {
      const selectedDate = fromKey(state.selected);
      const record = state.records[state.selected] || {};
      els.memoLabel.textContent = `${formatShort(selectedDate)} のメモ`;
      els.memoInput.value = record.note || "";
    }

    function renderHistory() {
      const recent = Object.entries(state.records)
        .filter(([, record]) => record.done)
        .sort(([a], [b]) => b.localeCompare(a))
        .slice(0, 8);
      els.historyList.innerHTML = "";
      if (!recent.length) {
        const empty = document.createElement("span");
        empty.className = "history-chip";
        empty.textContent = "まだこれから🌱";
        els.historyList.append(empty);
        return;
      }
      for (const [key] of recent) {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "history-chip";
        chip.textContent = formatShort(fromKey(key));
        chip.addEventListener("click", () => selectDate(key));
        els.historyList.append(chip);
      }
    }

    function say(message) {
      els.comment.textContent = message;
    }

    function ensureRecord(key) {
      if (!state.records[key]) {
        state.records[key] = { done: false, note: "" };
      }
      return state.records[key];
    }

    function isDone(key) {
      return Boolean(state.records[key]?.done);
    }

    function getStreak() {
      let streak = 0;
      const cursor = new Date();
      while (isDone(toKey(cursor))) {
        streak += 1;
        cursor.setDate(cursor.getDate() - 1);
      }
      return streak;
    }

    function loadRecords() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.records));
    }

    function startOfMonth(date) {
      return new Date(date.getFullYear(), date.getMonth(), 1);
    }

    function toKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function fromKey(key) {
      const [year, month, day] = key.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function formatLong(date) {
      return new Intl.DateTimeFormat("ja-JP", {
        year: "numeric", month: "long", day: "numeric", weekday: "long"
      }).format(date);
    }

    function formatShort(date) {
      return new Intl.DateTimeFormat("ja-JP", {
        month: "numeric", day: "numeric", weekday: "short"
      }).format(date);
    }

    function pick(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    render();
  </script>
</body>
</html>
